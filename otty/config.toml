theme = "Claude"
text-blink = true
font-family = "Monaco"
# font-size = 16 (reset to default)

tab-working-directory = "home"
privilege-notification-on-finish = true
copy-on-select = true
clipboard-trim-trailing-spaces = true
privilege-caffeinate-agent-processing = true


keybind = "cmd+shift+,=reload_config"

auto-theme-dark-mode = false

font-size = 16
theme-dark = "Nord"
foreground = "#3d3929"
background = "#faf6f1"
palette-0 = "#3d3929"
palette-1 = "#c44a3f"
palette-2 = "#5a8c5e"
palette-3 = "#d97706"
palette-4 = "#4a7fb5"
palette-5 = "#9b6b9e"
palette-6 = "#4a9b8e"
palette-7 = "#e8dfd3"
palette-8 = "#6b6456"
palette-9 = "#e05a4f"
palette-10 = "#6fa873"
palette-11 = "#e89b3e"
palette-12 = "#5a9ad5"
palette-13 = "#b580b8"
palette-14 = "#5ab8a8"
palette-15 = "#faf6f1"
selection-foreground = "#3d3929"
selection-background = "#e8dfd3"
cursor-color = "#d97706"
cursor-text = "#faf6f1"
