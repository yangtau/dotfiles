set -g mouse on

# Copy to system clipboard on mouse drag release (cross-platform)
if-shell "command -v pbcopy >/dev/null 2>&1" {
    bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
    bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
} {
    if-shell "command -v xclip >/dev/null 2>&1" {
        bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
        bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
    } {
        bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xsel --clipboard --input"
        bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xsel --clipboard --input"
    }
}

# Scroll enters copy mode automatically, exits when you reach the bottom
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# Pane navigation (no prefix needed, Option+h/j/k/l, no wrap)
bind -n M-h if -F '#{pane_at_left}' '' 'select-pane -L'
bind -n M-j if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind -n M-k if -F '#{pane_at_top}' '' 'select-pane -U'
bind -n M-l if -F '#{pane_at_right}' '' 'select-pane -R'

# Pane management (no prefix needed)
bind -n M-n split-window -h \; select-layout tiled
bind -n M-w kill-pane
bind -n M-o next-layout
bind -n M-g select-pane -m
bind -n M-y run 'tmux swap-pane -s \{marked\} && tmux select-pane -M'

# Window navigation (Option+number jumps to the matching window index)
bind -n M-0 select-window -t :=0
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4
bind -n M-5 select-window -t :=5
bind -n M-6 select-window -t :=6
bind -n M-7 select-window -t :=7
bind -n M-8 select-window -t :=8
bind -n M-9 select-window -t :=9
bind -n M-m new-window

# Scroll mode: Option+Tab to enter, j/k to scroll down/up, q or Escape to exit
bind -n M-Tab if -F '#{pane_in_mode}' 'send-keys -X cancel' 'copy-mode'
bind -T copy-mode-vi j send-keys -X -N 2 scroll-down
bind -T copy-mode-vi k send-keys -X -N 2 scroll-up
bind -T copy-mode-vi J send-keys -X halfpage-down
bind -T copy-mode-vi K send-keys -X halfpage-up

# Increase scrollback
set -g history-limit 10000

# Red pane borders with full box around each pane
set -g pane-border-style fg=colour236
set -g pane-active-border-style fg=red
set -g pane-border-lines heavy
set -g pane-border-indicators arrows
set -g allow-rename off
set -g pane-border-format " #{?@name,#{@name},#{b:pane_current_path}} "
set -g pane-border-status top

# Status bar showing window number and name
set -g status on
set -g status-style bg=default,fg=colour245
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style fg=red,bold
set -g status-left ""
set -g status-right ""
